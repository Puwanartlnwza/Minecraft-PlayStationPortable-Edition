name: Build Minecraft PSP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tool Versions
        run: |
          psp-config --version || true
          psp-gcc --version
          cmake --version
          make --version

      - name: Build
        run: |
          make

      - name: Inspect Build Output
        run: |
          echo "===== BUILD DIRECTORY ====="
          ls -lah build

          echo ""
          echo "===== FILE SIZES ====="
          ls -lh build/EBOOT.PBP
          ls -lh build/MinecraftPSP

      - name: Locate PSP Tools
        run: |
          echo "===== PSP TOOLS ====="
          which psp-readelf || true
          which psp-objdump || true
          which psp-strip || true
          which pack-pbp || true

      - name: Inspect ELF
        run: |
          if command -v psp-readelf >/dev/null 2>&1; then
            echo "===== ELF HEADER ====="
            psp-readelf -h build/MinecraftPSP
          fi

      - name: Check PBP Header
        run: |
          echo "===== PBP HEADER ====="
          od -An -tx1 -N16 build/EBOOT.PBP

      - name: Upload Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftPSP
          path: build/
