name: Build PSP

on:
workflow_dispatch:
push:
branches:
- main
- master

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Install build tools
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        cmake \
        git \
        python3

  - name: Clone PSPDEV
    run: |
      git clone --depth=1 https://github.com/pspdev/pspdev.git

  - name: Build PSP Toolchain
    run: |
      cd pspdev
      chmod +x build-all.sh
      ./build-all.sh

  - name: Setup Environment
    run: |
      echo "PSPDEV=/usr/local/pspdev" >> $GITHUB_ENV
      echo "PSPSDK=/usr/local/pspdev/psp/sdk" >> $GITHUB_ENV
      echo "/usr/local/pspdev/bin" >> $GITHUB_PATH

  - name: Configure
    run: |
      cmake \
        -B build \
        -DCMAKE_TOOLCHAIN_FILE=.cmake/psp.cmake

  - name: Build
    run: |
      cmake --build build -j$(nproc)

  - name: Upload EBOOT
    uses: actions/upload-artifact@v4
    with:
      name: MinecraftPSP
      path: |
        build/EBOOT.PBP
        res/**
